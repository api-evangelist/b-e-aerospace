aid: b-e-aerospace
name: B/E Aerospace
description: >-
  B/E Aerospace was a manufacturer of aircraft cabin interior products and a provider
  of aerospace services for commercial aircraft and business jets. The company was acquired
  by Rockwell Collins in 2017 and subsequently merged into Collins Aerospace (a Raytheon
  Technologies subsidiary) in 2020. B/E Aerospace products included seating, food and
  beverage preparation equipment, lighting systems, and oxygen systems for commercial
  and business aviation.
